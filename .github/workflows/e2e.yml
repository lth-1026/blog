name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Playwright's browser for running the tests. (Build-time Mermaid uses the
      # same Chromium; no diagram in any post yet, so the build never launches it.)
      - run: npx playwright install --with-deps chromium
      # playwright.config.ts builds + starts the app via its webServer, then runs.
      - run: npm run test:e2e
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
